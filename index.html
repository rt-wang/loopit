<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synesthetic Loop</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #eee;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    #header {
      width: 100%;
      max-width: 640px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    #header h1 { font-size: 18px; letter-spacing: 2px; }
    #header span { font-size: 14px; color: #888; }
    #canvas-container { position: relative; }
    .btn {
      background: #333;
      color: #eee;
      border: 1px solid #555;
      padding: 10px 24px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      cursor: pointer;
      margin: 12px 4px;
      transition: background 0.2s;
    }
    .btn:hover { background: #444; }
    .btn:disabled { opacity: 0.3; cursor: default; }
    #controls { margin: 12px 0; text-align: center; }
    #status { color: #888; font-size: 12px; margin: 8px 0; text-align: center; }
    #interpretation-panel {
      width: 100%;
      max-width: 640px;
      border: 1px solid #333;
      background: #171717;
      color: #ddd;
      padding: 12px 14px;
      margin-top: 10px;
      display: none;
    }
    #interpretation-panel h2 {
      font-size: 12px;
      letter-spacing: 1px;
      color: #8f8f8f;
      margin-bottom: 8px;
    }
    #interpretation-text {
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.45;
      color: #f0f0f0;
    }
    #caption-text {
      margin-top: 10px;
      color: #9dc7ff;
      font-size: 12px;
      line-height: 1.4;
    }
    #history-strip {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #history-strip img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border: 1px solid #333;
    }
    #drop-zone {
      border: 2px dashed #555;
      padding: 20px;
      text-align: center;
      color: #666;
      font-size: 12px;
      margin-bottom: 12px;
      max-width: 640px;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>SYNESTHETIC LOOP</h1>
    <span id="iteration-label">iteration: 1</span>
  </div>
  <div id="drop-zone">Drop an image here or click Play to use default</div>
  <div id="canvas-container"></div>
  <div id="controls"></div>
  <div id="status"></div>
  <div id="interpretation-panel">
    <h2>AI INTERPRETATION</h2>
    <div id="interpretation-text"></div>
    <div id="caption-text"></div>
  </div>
  <div id="history-strip"></div>

  <script src="kmeans.js"></script>
  <script src="music.js"></script>
  <script src="spectrogram.js"></script>
  <script src="renderer.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
